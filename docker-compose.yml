version: '3.8'

services:
  bot-controller:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ADB_HOST=android-emulator
    depends_on:
      - android-emulator
    networks:
      - bot-net

  android-emulator:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    devices:
      - "/dev/kvm:/dev/kvm"
    environment:
      - EMULATOR_DEVICE="Samsung Galaxy S10"
      - WEB_VNC=true
    ports:
      - "6080:6080" # Web VNC access
      - "5555:5555" # ADB access
    networks:
      - bot-net

networks:
  bot-net:
